<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Evaluación: Lista de Tareas</title>
    <!-- Cargamos la librería de Supabase primero -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; max-width: 400px; margin: 40px auto; padding: 20px; }
        .item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #ddd; }
        button { cursor: pointer; }
    </style>
</head>
<body>
    <h2>Mi Base de Datos de Tareas</h2>
    <input type="text" id="inputTarea" placeholder="Escribe algo...">
    <button onclick="crearTarea()">Agregar</button>
    <div id="lista"></div>

    <script>
        // REEMPLAZA ESTOS DOS VALORES CON LOS TUYOS
        const URL = 'https://efjcmudrgomexsznwwmc.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmamNtdWRyZ29tZXhzem53d21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjAzODYsImV4cCI6MjA4ODk5NjM4Nn0.oI2_XJND51OrN42KuduzMeEYWpTbjWw0qqT-';
        
        // Creamos la conexión
        const supabaseClient = supabase.createClient(URL, KEY);

        // Función para mostrar tareas
        async function obtenerTareas() {
            const { data, error } = await supabaseClient.from('todos').select('*').order('id', { ascending: false });
            if (error) { console.log(error); return; }
            
            const contenedor = document.getElementById('lista');
            contenedor.innerHTML = '';
            data.forEach(tarea => {
                contenedor.innerHTML += `
                    <div class="item">
                        <span>${tarea.task}</span>
                        <button onclick="borrarTarea(${tarea.id})">Borrar</button>
                    </div>`;
            });
        }

        // Función para crear
        async function crearTarea() {
            const txt = document.getElementById('inputTarea').value;
            if(!txt) return;
            await supabaseClient.from('todos').insert([{ task: txt, is_completed: false }]);
            document.getElementById('inputTarea').value = '';
            obtenerTareas();
        }

        // Función para borrar
        async function borrarTarea(id) {
            await supabaseClient.from('todos').delete().eq('id', id);
            obtenerTareas();
        }

        // Iniciar al cargar la página
        obtenerTareas();
    </script>
</body>
</html>
