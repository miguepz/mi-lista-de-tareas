<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ENTREGA FINAL - BASE DE DATOS</title>
    <!-- ESTE ES EL SECRETO: CARGARLA DESDE OTRO SERVIDOR MÁS CONFIABLE -->
    <script src="https://cdn.jsdelivr.net"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #eee; }
        .caja { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; background: #24b47e; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .tarea { margin-top: 15px; border-bottom: 1px solid #ddd; padding: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <div class="caja">
        <h2>Mi Lista de Tareas Real</h2>
        <input type="text" id="nuevaTarea" placeholder="Escribe aquí...">
        <button id="btnAgregar">AGREGAR</button>
        <div id="lista"></div>
    </div>

    <script>
        // TUS DATOS (CÓPIALOS BIEN)
        const URL = 'https://efjcmudrgomexsznwwmc.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmamNtdWRyZ29tZXhzem53d21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjAzODYsImV4cCI6MjA4ODk5NjM4Nn0.oI2_XJND51OrN42KuduzMeEYWpTbjWw0qqT-';

        let supabaseClient;

        // FUNCIÓN QUE ARRANCA TODO
        function iniciar() {
            // Intentar crear el cliente
            if (typeof supabase !== 'undefined') {
                supabaseClient = supabase.createClient(URL, KEY);
                console.log("Conectado a Supabase");
                cargarTareas();
            } else {
                // Si falla, intentamos cargarla otra vez manualmente
                console.error("La librería no cargó. Reintentando...");
                setTimeout(iniciar, 2000);
            }
        }

        async function cargarTareas() {
            const { data, error } = await supabaseClient.from('todos').select('*').order('id', { ascending: false });
            if (error) return console.log(error);
            
            const div = document.getElementById('lista');
            div.innerHTML = '';
            data.forEach(t => {
                div.innerHTML += `<div class="tarea"><span>${t.task}</span> <button onclick="borrar(${t.id})" style="background:red; padding:2px 5px;">X</button></div>`;
            });
        }

        document.getElementById('btnAgregar').onclick = async () => {
            const input = document.getElementById('nuevaTarea');
            if(!input.value) return;
            
            await supabaseClient.from('todos').insert([{ task: input.value }]);
            input.value = '';
            cargarTareas();
        };

        async function borrar(id) {
            await supabaseClient.from('todos').delete().eq('id', id);
            cargarTareas();
        }

        // Arrancamos la conexión
        iniciar();
    </script>
</body>
</html>
