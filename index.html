<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Tarea Base de Datos</title>
    <!-- Usamos un servidor diferente para la librería (UNPKG) -->
    <script src="https://unpkg.com"></script>
</head>
<body>
    <h3>Mi Lista de Tareas</h3>
    <input type="text" id="nuevaTarea" placeholder="Escribe algo...">
    <button onclick="enviar()">Agregar</button>
    <div id="lista"></div>

    <script>
        // REEMPLAZA CON TUS DATOS
        const PROYECTO_URL = 'https://efjcmudrgomexsznwwmc.supabase.co';
        const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmamNtdWRyZ29tZXhzem53d21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjAzODYsImV4cCI6MjA4ODk5NjM4Nn0.oI2_XJND51OrN42KuduzMeEYWpTbjWw0qqT-';

        // Intentar conectar con la base de datos
        const db = supabase.createClient(PROYECTO_URL, ANON_KEY);

        // FUNCIÓN PARA VER LAS TAREAS
        async function ver() {
            const { data, error } = await db.from('todos').select('*');
            if (error) { console.log(error); return; }
            
            let html = "";
            data.forEach(t => {
                html += `<div>${t.task} <button onclick="borrar(${t.id})">Eliminar</button></div>`;
            });
            document.getElementById('lista').innerHTML = html;
        }

        // FUNCIÓN PARA GUARDAR
        async function enviar() {
            const texto = document.getElementById('nuevaTarea').value;
            if(!texto) return;
            await db.from('todos').insert([{ task: texto }]);
            document.getElementById('nuevaTarea').value = '';
            ver();
        }

        // FUNCIÓN PARA BORRAR
        async function borrar(id) {
            await db.from('todos').delete().eq('id', id);
            ver();
        }

        // Cargar al iniciar
        ver();
    </script>
</body>
</html>
