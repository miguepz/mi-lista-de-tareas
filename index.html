<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>ENTREGA FINAL</title>
    <script src="https://unpkg.com"></script>
</head>
<body>
    <h1>LISTA DE TAREAS</h1>
    <input type="text" id="tareaInput" placeholder="Escribe algo...">
    <button onclick="enviar()">PROBAR BOTON</button>
    <div id="contenedor"></div>

    <script>
        const SB_URL = 'https://efjcmudrgomexsznwwmc.supabase.co';
        const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmamNtdWRyZ29tZXhzem53d21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjAzODYsImV4cCI6MjA4ODk5NjM4Nn0.oI2_XJND51OrN42KuduzMeEYWpTbjWw0qqT-';

        // 1. Esto nos dirá si el código cargó
        console.log("Código cargado correctamente");

        async function enviar() {
            alert("¡El botón funciona! Ahora intentando conectar...");
            
            const client = supabase.createClient(SB_URL, SB_KEY);
            const texto = document.getElementById('tareaInput').value;

            const { error } = await client.from('todos').insert([{ task: texto }]);

            if (error) {
                alert("Error de Supabase: " + error.message);
            } else {
                alert("¡Guardado con éxito!");
                location.reload(); // Recarga para ver la lista
            }
        }

        async function cargar() {
            const client = supabase.createClient(SB_URL, SB_KEY);
            const { data } = await client.from('todos').select('*');
            if (data) {
                document.getElementById('contenedor').innerHTML = data.map(t => 
                    `<p>${t.task} <button onclick="borrar(${t.id})">X</button></p>`
                ).join('');
            }
        }

        async function borrar(id) {
            const client = supabase.createClient(SB_URL, SB_KEY);
            await client.from('todos').delete().eq('id', id);
            location.reload();
        }

        cargar();
    </script>
</body>
</html>
