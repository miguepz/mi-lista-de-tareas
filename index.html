<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Evaluacion Final</title>
    <script src="https://unpkg.com"></script>
</head>
<body>
    <h3>Mi Lista de Tareas</h3>
    <input type="text" id="tarea" placeholder="Escribir...">
    <button onclick="guardar()">AGREGAR TAREA</button>
    <div id="lista" style="margin-top: 20px;"></div>

    <script>
        // REEMPLAZA CON TUS DATOS REALES
        const URL = 'https://efjcmudrgomexsznwwmc.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVmamNtdWRyZ29tZXhzem53d21jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MjAzODYsImV4cCI6MjA4ODk5NjM4Nn0.oI2_XJND51OrN42KuduzMeEYWpTbjWw0qqT-';
        
        let supabaseClient;

        // Iniciar conexion
        window.onload = () => {
            supabaseClient = supabase.createClient(URL, KEY);
            mostrar();
        };

        async function mostrar() {
            const { data } = await supabaseClient.from('todos').select('*').order('id', { ascending: false });
            const div = document.getElementById('lista');
            div.innerHTML = data ? data.map(t => 
                `<div>- ${t.task} <button onclick="borrar(${t.id})">Borrar</button></div>`
            ).join('') : 'Cargando...';
        }

        async function guardar() {
            const input = document.getElementById('tarea');
            if(!input.value) return alert("Escribe algo");
            
            const { error } = await supabaseClient.from('todos').insert([{ task: input.value }]);
            if(error) return alert("Error de Permisos: " + error.message);
            
            input.value = '';
            mostrar();
        }

        async function borrar(id) {
            await supabaseClient.from('todos').delete().eq('id', id);
            mostrar();
        }
    </script>
</body>
</html>
